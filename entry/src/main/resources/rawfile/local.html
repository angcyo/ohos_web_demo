<!DOCTYPE html>
<html lang="cn">
  <head>
    <meta charset="UTF-8">
    <title>Local</title>
  </head>
  <body>
    <p>
      <input type="text" id="input" value="发送的消息~">
    </p>
    <p>
      <button id="nativeCallButton">原生调用</button>
      <button id="jsBridgeCallButton">JSBridge调用</button>
      <button id="loadBaidu">加载百度</button>
    </p>
    <div id="text">This is some message.</div>
    <div>Wasm Result↓</div>
    <div id="textWasm"></div>

    <script>
      const input = document.getElementById("input")
      const text = document.getElementById("text")
      const nativeCallButton = document.getElementById("nativeCallButton")
      const jsBridgeCallButton = document.getElementById("jsBridgeCallButton")
      const loadBaidu = document.getElementById("loadBaidu")

      nativeCallButton.addEventListener('click', function () {
        if (typeof jsbObj !== 'undefined') {
          jsbObj.testJSCall(input.value)
        } else {
          console.info("jsbObj is error!")
          changeWebMessage("jsbObj is error!")
        }
      })

      jsBridgeCallButton.addEventListener('click', function () {
        // 通过 jsbridge.call('xxx', xxx) 调用 ArkTS 函数
        if (typeof jsbridge !== 'undefined') {
          jsbridge.call('testJSCall', input.value)
        } else {
          console.info("jsbridge is error!")
          changeWebMessage("jsbridge is error!")
        }
      })

      // 通过 jsbridge.call('xxx', xxx) 调用 ArkTS 函数
      loadBaidu.addEventListener('click', function () {
        if (typeof jsbridge !== 'undefined') {
          jsbridge.call('loadBaidu')
        } else {
          console.info("jsbridge is error!")
          changeWebMessage("jsbridge is error!")
        }
      })

      function changeWebMessage(str) {
        text.innerHTML = str
      }

      // 通过原生调用的测试方法
      function testNativeCall(str) {
        changeWebMessage(str)
      }
    </script>

    <!--Wasm-->
    <script type="module">
      // 导入 wasm-pack 生成的胶水代码
      import init, {
        test_bool,
        test_int,
        test_double,
        test_str,
        test_string,
        test_bytes,
        test_buffer,
        test_box
      } from './pkg/rust_hello_wasm.js'

      async function start() {
        // 初始化 Wasm 模块
        await init()

        // 直接像 JS 函数一样使用
        const textWasm = document.getElementById("textWasm")
        textWasm.innerHTML = "test_bool->" + test_bool(true) + "<br>" +
          "test_int->" + test_int(10) + "<br>" +
          "test_double->" + test_double(20) + "<br>" +
          "test_str->" + test_str("str") + "<br>" +
          "test_string->" + test_string("string") + "<br>" +
          "test_bytes->" + test_bytes(new Uint8Array([1, 2, 3])) + "<br>" +
          /*"test_buffer->" + test_buffer([1, 2, 3], 3) + "<br>" +*/
          "test_box->" + test_box(["b", "o", "x", 1, 2, 3]) + "<br>"
      }

      start()
    </script>
